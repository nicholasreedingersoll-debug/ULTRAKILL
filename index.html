<html lang="en-us">

<head>
    <base href="https://cdn.jsdelivr.net/gh/genizy/web-port@latest/ultrakill/">
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <title>Unity WebGL Player | ULTRAKILL</title>
    <style>
        html,
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100%;
            width: 100%;
        }

        #unity-container {
            width: 100%;
            height: 100%;
            position: fixed;
            top: 0;
            left: 0;
        }
    </style>
</head>

<body style="text-align: center; padding: 0; border: 0; margin: 0;">
    <div id="loading-text" style="color: black; font-family: cursive; font-size: 48px; text-align: center; margin-top: 20px;">LOADING...</div>
    <canvas id="unity-canvas" tabindex="-1" hidden></canvas>
    <script src="Build/ultrakill.loader.js"></script>
    <script>
        // WebGL Detection Function
        function getWebGLContext() {
            var canvas = document.createElement('canvas');
            var gl = canvas.getContext('webgl') || canvas.getContext('experimental-webgl');
            if (!gl) {
                gl = canvas.getContext('webgl2') || canvas.getContext('experimental-webgl2');
            }
            return gl;
        }

        function checkWebGLSupport() {
            var gl = getWebGLContext();
            return gl instanceof WebGLRenderingContext || gl instanceof WebGL2RenderingContext;
        }

        // Browser Compatibility Check
        function showCompatibilityWarning() {
            var loadingText = document.querySelector("#loading-text");
            var warningText = "⚠️ WebGL Not Supported<br><br>";
            warningText += "Your browser does not support WebGL, which is required to run ULTRAKILL.<br><br>";
            warningText += "<strong>Supported Browsers:</strong><br>";
            warningText += "• Chrome/Edge 8+<br>";
            warningText += "• Firefox 4+<br>";
            warningText += "• Safari 5.1+<br>";
            warningText += "• Opera 12+<br><br>";
            warningText += "<strong>Please try:</strong><br>";
            warningText += "1. Update your browser to the latest version<br>";
            warningText += "2. Enable WebGL in browser settings<br>";
            warningText += "3. Check if your GPU drivers are up to date<br>";
            warningText += "4. Try a different browser<br>";
            loadingText.innerHTML = warningText;
            loadingText.style.fontSize = "16px";
            loadingText.style.lineHeight = "1.6";
        }

        if (!checkWebGLSupport()) {
            showCompatibilityWarning();
            throw new Error("WebGL is required but not supported in this browser");
        }

        var canvas = document.querySelector("#unity-canvas");
        if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
            // Mobile device style: fill the whole browser client area with the game canvas:
            var meta = document.createElement('meta');
            meta.name = 'viewport';
            meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
            document.getElementsByTagName('head')[0].appendChild(meta);
            canvas.style.width = "100%";
            canvas.style.height = "100%";
            canvas.style.position = "fixed";
            document.body.style.textAlign = "left";
        } else {
            function resizeCanvas() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
                canvas.style.width = window.innerWidth + "px";
                canvas.style.height = window.innerHeight + "px";
            }
            resizeCanvas();
            window.addEventListener('resize', resizeCanvas);
        }

        function mergeFiles(fileParts) {
            return new Promise((resolve, reject) => {
                let buffers = [];

                function fetchPart(index) {
                    if (index >= fileParts.length) {
                        let mergedBlob = new Blob(buffers);
                        let mergedFileUrl = URL.createObjectURL(mergedBlob);
                        resolve(mergedFileUrl);
                        return;
                    }
                    fetch(fileParts[index]).then((response) => response.arrayBuffer()).then((data) => {
                        buffers.push(data);
                        fetchPart(index + 1);
                    }).catch(reject);
                }
                fetchPart(0);
            });
        }

        function getParts(file, start, end) {
            let parts = [];
            for (let i = start; i <= end; i++) {
                parts.push(file + ".part" + i);
            }
            return parts;
        }
        Promise.all([
            mergeFiles(getParts("Build/ultrakill.data.unityweb", 1, 4)),
            mergeFiles(getParts("Build/ultrakill.wasm.unityweb", 1, 2))
        ]).then(([dataUrl, wasmurl]) => {
            document.querySelector("#unity-canvas").hidden = false;
            createUnityInstance(document.querySelector("#unity-canvas"), {
                dataUrl: dataUrl,
                frameworkUrl: "Build/ultrakill.framework.js.unityweb",
                codeUrl: wasmurl,
                streamingAssetsUrl: "StreamingAssets",
                companyName: "Hakita and Cake Logic",
                productName: "ULTRAKILL",
                productVersion: "1.4",
                // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
                // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
            }).then((e) => {
                document.querySelector("#loading-text").remove();
            }).catch((error) => {
                console.error("Failed to load ULTRAKILL:", error);
                document.querySelector("#loading-text").innerHTML = "❌ Failed to load game. Please refresh the page or try a different browser.";
            });
        }).catch((error) => {
            console.error("Failed to load game assets:", error);
            document.querySelector("#loading-text").innerHTML = "❌ Error loading game assets. Check your browser console for details.";
        });
    </script>
</body>

</html>
